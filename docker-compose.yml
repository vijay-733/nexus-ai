version: '3.9'

services:
  # ── Backend ──────────────────────────────────────────────────────────────────
  nexus-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus-backend
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NODE_ENV:          production
      SERVER_PORT:       3002
      JWT_SECRET:        ${JWT_SECRET:?JWT_SECRET required}
      OPENAI_API_KEY:    ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      STABILITY_API_KEY: ${STABILITY_API_KEY:-}
      POSTGRES_URL:      postgresql://nexus:${POSTGRES_PASSWORD:-nexus_dev}@postgres:5432/nexus
      REDIS_URL:         redis://redis:6379
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:         ["CMD-SHELL", "wget -qO- http://localhost:3002/health/live || exit 1"]
      interval:     30s
      timeout:      10s
      retries:      3
      start_period: 20s
    networks:
      - nexus

  # ── Frontend ──────────────────────────────────────────────────────────────────
  nexus-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: nexus-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      nexus-backend:
        condition: service_healthy
    networks:
      - nexus

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     nexus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexus_dev}
      POSTGRES_DB:       nexus
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U nexus -d nexus"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks:
      - nexus

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  3
    networks:
      - nexus

  # ── Prometheus ────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: nexus-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    depends_on:
      - nexus-backend
    networks:
      - nexus

  # ── Grafana ───────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.0
    container_name: nexus-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-nexus_grafana}
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_SERVER_ROOT_URL:         "%(protocol)s://%(domain)s:%(http_port)s/grafana"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - nexus

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  nexus:
    driver: bridge
