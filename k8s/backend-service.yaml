apiVersion: v1
kind: Service
metadata:
  name: nexus-backend
  namespace: nexus-ai
  labels:
    app: nexus-backend
spec:
  selector:
    app: nexus-backend
  ports:
    - name:       http
      port:       3002
      targetPort: 3002
      protocol:   TCP
  type: ClusterIP
---
# External LoadBalancer for direct access (use Ingress in production)
apiVersion: v1
kind: Service
metadata:
  name: nexus-backend-lb
  namespace: nexus-ai
spec:
  selector:
    app: nexus-backend
  ports:
    - port:       80
      targetPort: 3002
  type: LoadBalancer
