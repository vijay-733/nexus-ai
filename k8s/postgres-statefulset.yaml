apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nexus-postgres
  namespace: nexus-ai
spec:
  serviceName: nexus-postgres
  replicas: 1
  selector:
    matchLabels:
      app: nexus-postgres
  template:
    metadata:
      labels:
        app: nexus-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name:  POSTGRES_USER
              value: nexus
            - name:  POSTGRES_DB
              value: nexus
            - name:  POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexus-secrets
                  key:  POSTGRES_PASSWORD
                  optional: true
            - name:  PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu:    "250m"
              memory: "512Mi"
            limits:
              cpu:    "1000m"
              memory: "2Gi"
          readinessProbe:
            exec:
              command: [pg_isready, -U, nexus, -d, nexus]
            initialDelaySeconds: 10
            periodSeconds:       5
          livenessProbe:
            exec:
              command: [pg_isready, -U, nexus, -d, nexus]
            initialDelaySeconds: 30
            periodSeconds:       20
          volumeMounts:
            - name:      postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: nexus-postgres
  namespace: nexus-ai
spec:
  clusterIP: None
  selector:
    app: nexus-postgres
  ports:
    - port: 5432
